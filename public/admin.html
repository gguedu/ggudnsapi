<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GGU DNS 管理后台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0e8;
      --paper: rgba(255,255,255,.84);
      --paper-strong: #fffdf8;
      --ink: #172033;
      --muted: #6c7280;
      --line: rgba(27,35,55,.11);
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --red: #dc2626;
      --green: #159947;
      --shadow: 0 24px 70px rgba(39,48,72,.14);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: radial-gradient(circle at 8% 12%, #dce9ff 0 16%, transparent 34%), radial-gradient(circle at 88% 4%, #fff2c7 0 14%, transparent 32%), linear-gradient(135deg, #f7f3eb, #edf3ff 52%, #f7f7f2); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    .hidden { display: none !important; }
    .app { min-height: 100vh; padding: 18px; }
    .shell { min-height: calc(100vh - 36px); display: grid; grid-template-columns: 280px 1fr; gap: 18px; }
    .card { background: var(--paper); border: 1px solid rgba(255,255,255,.78); box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.9); backdrop-filter: blur(22px); border-radius: 30px; }
    .login { min-height: calc(100vh - 36px); display: grid; place-items: center; }
    .login-card { width: min(760px, 94vw); padding: 34px; }
    .eyebrow { margin: 0 0 10px; text-transform: uppercase; letter-spacing: .32em; color: #8b94a6; font-size: 12px; font-weight: 800; }
    h1 { margin: 0; font-size: clamp(34px, 6vw, 72px); line-height: .95; letter-spacing: -.065em; }
    h2 { margin: 0; font-size: 26px; letter-spacing: -.03em; }
    h3 { margin: 0 0 12px; font-size: 17px; }
    p { color: var(--muted); line-height: 1.7; }
    .token-row, .toolbar, .form-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    input, select, textarea { border: 1px solid var(--line); background: rgba(255,255,255,.72); color: var(--ink); border-radius: 16px; padding: 12px 14px; outline: none; min-width: 0; transition: border-color .2s, box-shadow .2s, background .2s; }
    input:focus, select:focus, textarea:focus { border-color: rgba(37,99,235,.55); box-shadow: 0 0 0 4px rgba(37,99,235,.12); background: #fff; }
    textarea { resize: vertical; min-height: 82px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 16px; padding: 12px 16px; font-weight: 800; background: var(--blue); color: white; box-shadow: 0 10px 24px rgba(37,99,235,.22); transition: transform .2s, box-shadow .2s, opacity .2s; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 34px rgba(37,99,235,.25); }
    .btn.secondary { background: #fff; color: var(--ink); box-shadow: inset 0 0 0 1px var(--line); }
    .btn.danger { background: #fee2e2; color: #991b1b; box-shadow: inset 0 0 0 1px #fecaca; }
    .btn.ghost { background: transparent; color: var(--muted); box-shadow: none; }
    .sidebar { padding: 20px; display: flex; flex-direction: column; gap: 18px; }
    .brand { padding: 14px; border-radius: 24px; background: linear-gradient(135deg, #ffffff, #edf4ff); border: 1px solid var(--line); }
    .brand-mark { width: 46px; height: 46px; border-radius: 16px; background: linear-gradient(135deg, #2563eb, #7dd3fc); color: #fff; display: grid; place-items: center; font-weight: 900; margin-bottom: 16px; }
    .nav { display: grid; gap: 8px; }
    .nav button { text-align: left; border-radius: 18px; padding: 13px 14px; background: transparent; color: #5d6678; font-weight: 800; }
    .nav button.active { background: var(--ink); color: white; box-shadow: 0 14px 30px rgba(23,32,51,.2); }
    .side-foot { margin-top: auto; padding: 14px; border-radius: 22px; background: rgba(255,255,255,.58); border: 1px solid var(--line); color: var(--muted); font-size: 13px; }
    .main { display: grid; grid-template-rows: auto 1fr; min-width: 0; }
    .topbar { margin-bottom: 18px; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .content { padding: 24px; overflow: auto; min-height: 0; }
    .panel { background: rgba(255,255,255,.64); border: 1px solid var(--line); border-radius: 26px; padding: 20px; margin-bottom: 18px; }
    .panel.soft { background: linear-gradient(135deg, rgba(255,255,255,.82), rgba(245,248,255,.74)); }
    .section-stack { display: grid; gap: 16px; max-width: 1040px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
    .form-grid .wide { grid-column: 1 / -1; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
    th { color: #7b8495; font-size: 12px; text-transform: uppercase; letter-spacing: .12em; text-align: left; padding: 8px 12px; }
    td { background: rgba(255,255,255,.76); padding: 13px 12px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: middle; }
    td:first-child { border-left: 1px solid var(--line); border-radius: 16px 0 0 16px; }
    td:last-child { border-right: 1px solid var(--line); border-radius: 0 16px 16px 0; }
    .mini-actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .mini { border-radius: 999px; padding: 7px 10px; font-size: 12px; font-weight: 800; background: #eef2ff; color: #2446a8; }
    .mini.danger { background: #fee2e2; color: #991b1b; }
    .mini.ok { background: #dcfce7; color: #166534; }
    .badge { display: inline-flex; border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 800; background: #eef2ff; color: #1d4ed8; }
    .badge.red { background: #fee2e2; color: #991b1b; }
    .badge.green { background: #dcfce7; color: #166534; }
    .muted { color: var(--muted); }
    .status { min-height: 24px; color: #1d4ed8; font-weight: 700; }
    .status.error { color: var(--red); }
    .type-board { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .dropbox { min-height: 150px; border: 1px dashed rgba(37,99,235,.35); border-radius: 22px; padding: 14px; background: rgba(255,255,255,.62); }
    .dropbox.reject { border-color: rgba(220,38,38,.32); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { user-select: none; border-radius: 999px; padding: 9px 12px; font-size: 13px; font-weight: 900; background: #e8f0ff; color: #1d4ed8; border: 1px solid rgba(37,99,235,.14); }
    .chip.reject { background: #fff1f2; color: #be123c; border-color: rgba(225,29,72,.14); }
    .chip.dragging { opacity: .45; }
    .help { font-size: 13px; color: var(--muted); background: #fff; border: 1px solid var(--line); padding: 12px 14px; border-radius: 18px; }
    pre { white-space: pre-wrap; color: #475569; background: #fff; border: 1px solid var(--line); padding: 14px; border-radius: 18px; }
    @media (max-width: 900px) { .shell { grid-template-columns: 1fr; } .sidebar { position: static; } .type-board { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="loginView" class="app login">
    <section class="card login-card">
      <p class="eyebrow">GGU DNS Admin</p>
      <h1>管理后台</h1>
      <p>请使用管理员 GGU 通行证邮箱和密码登录。后台会自动向通行证 Worker 校验身份，并确认邮箱是否在 <code>DNS_ADMIN_EMAILS</code> 中。</p>
      <div class="token-row">
        <input id="adminEmail" style="flex:1 1 280px" type="email" placeholder="管理员邮箱" autocomplete="username" />
        <input id="adminPassword" style="flex:1 1 240px" type="password" placeholder="密码" autocomplete="current-password" />
        <button class="btn" onclick="adminLogin()">登录后台</button>
        <button class="btn secondary" onclick="logout()">清除登录</button>
      </div>
      <p id="loginStatus" class="status"></p>
      <p class="help">这里不会要求手动复制 token。登录成功后后台会自动保存通行证 token，并在后续请求中通过 Authorization 请求头携带。</p>
    </section>
  </div>

  <div id="adminView" class="app hidden">
    <div class="shell">
      <aside class="card sidebar">
        <div class="brand">
          <div class="brand-mark">DNS</div>
          <p class="eyebrow">Control Plane</p>
          <h2>GGU DNS</h2>
          <p id="adminName" class="muted"></p>
        </div>
        <nav id="tabs" class="nav"></nav>
        <div class="side-foot">
          所有管理操作都会再次请求 <code>/api/admin/**</code> 并校验管理员权限。
          <div style="margin-top:12px"><button class="btn danger" onclick="logout()">退出后台</button></div>
        </div>
      </aside>

      <main class="main">
        <header class="card topbar">
          <div>
            <p class="eyebrow" id="sectionEyebrow">Admin</p>
            <h2 id="sectionTitle">用户管理</h2>
          </div>
          <div class="toolbar">
            <button class="btn secondary" onclick="loadAll()">刷新数据</button>
          </div>
        </header>
        <section class="card content">
          <p id="status" class="status"></p>
          <div id="view"></div>
        </section>
      </main>
    </div>
  </div>

<script>
const ALL_TYPES = ['A','AAAA','CNAME','HTTPS','TXT','SRV','LOC','MX','NS','CERT','DNSKEY','DS','NAPTR','SMIMEA','SSHFP','SVCB','TLSA','URI','CAA']
const tabs = [
  ['users', '用户管理', 'Users'],
  ['accounts', 'CF 账户', 'Cloudflare'],
  ['domains', '域名池', 'Domains'],
  ['blacklist', '黑名单', 'Blacklist'],
  ['settings', '设置', 'Settings'],
  ['records', '解析总览', 'Records']
]
let current = 'users'
let cache = {}
let authed = false
let draggedType = ''
const $ = id => document.getElementById(id)
const esc = v => String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))
const token = () => localStorage.getItem('mail_token') || ''
const setLogin = (msg, err=false) => { $('loginStatus').textContent = msg; $('loginStatus').className = err ? 'status error' : 'status' }
const setStatus = (msg, err=false) => { $('status').textContent = msg; $('status').className = err ? 'status error' : 'status' }
async function api(path, options = {}) {
  const res = await fetch(path, { ...options, headers: { 'content-type': 'application/json', Authorization: token(), ...(options.headers || {}) } })
  const body = await res.json().catch(() => ({}))
  if (!res.ok || body.success === false) throw new Error(body.message || `HTTP ${res.status}`)
  return body.data
}
async function adminLogin() {
  const email = $('adminEmail').value.trim()
  const password = $('adminPassword').value
  if (!email || !password) return setLogin('请输入管理员邮箱和密码', true)
  try {
    setLogin('正在登录并校验管理员身份...')
    const data = await api('/api/auth/admin-login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
      headers: {}
    })
    localStorage.setItem('mail_token', data.token)
    await enterAdmin()
  } catch (e) {
    setLogin(e.message, true)
  }
}
async function enterAdmin() {
  if (!token()) return setLogin('请先登录管理员账号', true)
  try {
    setLogin('正在校验管理员权限...')
    const me = await api('/api/auth/me')
    if (!me.isAdmin) throw new Error('当前登录邮箱不在 DNS_ADMIN_EMAILS 中')
    authed = true
    $('loginView').classList.add('hidden')
    $('adminView').classList.remove('hidden')
    $('adminName').textContent = `${me.user.email} · ${me.user.uid}`
    renderTabs()
    await loadAll()
  } catch (e) {
    authed = false
    setLogin(e.message, true)
  }
}
function logout() {
  localStorage.removeItem('mail_token')
  authed = false
  cache = {}
  $('adminView').classList.add('hidden')
  $('loginView').classList.remove('hidden')
  setLogin('已退出')
}
function renderTabs() {
  $('tabs').innerHTML = tabs.map(([id, label]) => `<button class="${id===current?'active':''}" onclick="current='${id}';renderTabs();render()">${label}</button>`).join('')
}
async function loadAll() {
  if (!authed) return
  try {
    setStatus('正在刷新...')
    const [users, accounts, domains, blacklist, settings, records] = await Promise.all([
      api('/api/admin/users'), api('/api/admin/cf-accounts'), api('/api/admin/domains'), api('/api/admin/blacklist'), api('/api/admin/settings'), api('/api/admin/records')
    ])
    cache = { users, accounts, domains, blacklist, settings, records }
    setStatus('已刷新')
    render()
  } catch (e) { setStatus(e.message, true) }
}
function table(rows, cols) {
  return `<table><thead><tr>${cols.map(c=>`<th>${c[1]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${typeof c[0]==='function'?c[0](r):esc(r[c[0]])}</td>`).join('')}</tr>`).join('')}</tbody></table>`
}
function render() {
  const tab = tabs.find(t => t[0] === current)
  $('sectionTitle').textContent = tab?.[1] || ''
  $('sectionEyebrow').textContent = tab?.[2] || 'Admin'
  if (current === 'users') renderUsers()
  if (current === 'accounts') renderAccounts()
  if (current === 'domains') renderDomains()
  if (current === 'blacklist') renderBlacklist()
  if (current === 'settings') renderSettings()
  if (current === 'records') renderRecords()
}
function renderUsers() {
  $('view').innerHTML = `<div class="section-stack">
    <section class="panel soft"><h3>添加用户</h3><div class="form-grid"><input id="uEmail" placeholder="邮箱"><input id="uUid" placeholder="UID，可留空使用邮箱"><input id="uName" placeholder="名称/备注"><input id="uPoints" type="number" min="0" placeholder="初始积分，默认 0"><button class="btn" onclick="addUser()">添加用户</button></div></section>
    <section class="panel"><h3>用户列表</h3>${table(cache.users||[], [['uid','UID'],['email','邮箱'],['points','积分'],[r=>r.banned?'<span class="badge red">已封禁</span>':'<span class="badge green">正常</span>','状态'],['recordCount','解析数'],[user=>`<div class="mini-actions"><button class="mini" onclick="adjust('${esc(user.uid)}')">积分</button><button class="mini ${user.banned?'ok':'danger'}" onclick="banUser('${esc(user.uid)}', ${user.banned?'false':'true'})">${user.banned?'解封':'封禁'}</button><button class="mini danger" onclick="deleteUser('${esc(user.uid)}')">删除</button></div>`,'操作']])}</section>
  </div>`
}
function renderAccounts() {
  $('view').innerHTML = `<div class="section-stack">
    <section class="panel soft"><h3>添加 Cloudflare 账户</h3><p class="muted">名称会自动从 Cloudflare 账户读取，你只需要填写备注和凭证。</p><div class="form-grid"><input id="accRemark" placeholder="备注名称，例如：主账号"><select id="accType" onchange="toggleCfFields()"><option value="token">API Token</option><option value="key_email">API Key + Email</option></select><input id="accEmail" class="cf-key hidden" placeholder="Cloudflare Email"><input id="accKey" class="cf-key hidden" placeholder="Global API Key"><input id="accToken" class="cf-token" placeholder="API Token"><button class="btn" onclick="addAccount()">添加账户</button></div></section>
    <section class="panel"><h3>账户列表</h3>${table(cache.accounts||[], [['id','ID'],['remark','备注'],['name','Cloudflare 账户名'],['accountId','Account ID'],['authType','模式'],[r=>r.hasApiToken?'是':'否','Token'],[r=>r.hasApiKey?'是':'否','Key'],[r=>`<button class="mini danger" onclick="deleteAccount('${esc(r.id)}')">删除</button>`,'操作']])}</section>
  </div>`
  toggleCfFields()
}
function toggleCfFields() {
  const mode = $('accType')?.value || 'token'
  document.querySelectorAll('.cf-key').forEach(el => el.classList.toggle('hidden', mode !== 'key_email'))
  document.querySelectorAll('.cf-token').forEach(el => el.classList.toggle('hidden', mode !== 'token'))
}
function renderDomains() {
  const options = (cache.accounts||[]).map(a => `<option value="${esc(a.id)}">${esc(a.remark || a.name)} · ${esc(a.name)}</option>`).join('')
  $('view').innerHTML = `<div class="section-stack">
    <section class="panel soft"><h3>接入域名</h3><p class="muted">只需要填写域名并选择 Cloudflare 账户。后台会自动查询这个账户下是否存在该域名，存在才会接入。</p><div class="form-grid"><input id="root" placeholder="域名，例如 example.com"><select id="cfAccountId">${options}</select><input id="pointCost" type="number" min="1" placeholder="每条解析消耗积分，默认 1"><button class="btn" onclick="addDomain()">接入域名</button></div></section>
    <section class="panel"><h3>域名池</h3>${table(cache.domains||[], [['root','域名'],['zoneId','Zone ID'],[d=>esc(accountLabel(d.cfAccountId)),'账户'],[d=>d.enabled?'<span class="badge green">开放</span>':'<span class="badge red">关闭</span>','状态'],['pointCost','积分成本'],[d=>`<button class="mini danger" onclick="deleteDomain('${esc(d.root)}')">删除/禁用</button>`,'操作']])}</section>
  </div>`
}
function renderBlacklist() {
  $('view').innerHTML = `<div class="section-stack">
    <section class="panel soft"><h3>添加黑名单</h3><div class="form-grid"><input id="pattern" placeholder="规则内容"><select id="target"><option value="domain">域名</option><option value="user">用户</option></select><select id="type"><option value="exact">exact 完全匹配</option><option value="suffix">suffix 后缀匹配</option><option value="contains">contains 包含</option><option value="wildcard">wildcard 通配符</option></select><input id="reason" placeholder="原因"><button class="btn" onclick="addBlacklist()">添加规则</button></div><div class="help">规则说明：exact 精确匹配；suffix 匹配自身和子域，例如 example.com 会命中 a.example.com；contains 只要包含文本就命中；wildcard 支持一个 *，例如 *.bad.com。</div></section>
    <section class="panel"><h3>黑名单列表</h3>${table(cache.blacklist||[], [['pattern','规则'],['target','目标'],['type','匹配'],['reason','原因'],[r=>`<button class="mini danger" onclick="deleteBlacklist('${esc(r.id)}')">删除</button>`,'操作']])}</section>
  </div>`
}
function renderSettings() {
  const allowed = cache.settings?.allowedTypes || []
  const rejected = ALL_TYPES.filter(t => !allowed.includes(t))
  $('view').innerHTML = `<div class="section-stack">
    <section class="panel soft"><h3>解析类型权限</h3><p class="muted">默认全部在拒绝。把词条拖到“允许”后，用户新建解析时才可以选择该类型。</p><div class="type-board"><div class="dropbox" ondragover="event.preventDefault()" ondrop="dropType('allow')"><h3>允许</h3><div class="chips">${allowed.map(typeChip).join('')}</div></div><div class="dropbox reject" ondragover="event.preventDefault()" ondrop="dropType('reject')"><h3>拒绝</h3><div class="chips">${rejected.map(t=>typeChip(t,true)).join('')}</div></div></div><div style="margin-top:14px"><button class="btn" onclick="saveTypes()">保存解析类型</button></div></section>
    <section class="panel"><h3>子域保护</h3><div class="form-grid"><select id="protection"><option value="true">开启</option><option value="false">关闭</option></select><button class="btn secondary" onclick="saveProtection()">保存</button></div></section>
    <section class="panel"><h3>积分设置</h3><div class="form-grid"><input id="initialPoints" type="number" min="0" value="${esc(cache.settings?.initialPoints)}" placeholder="新用户初始积分"><select id="refund"><option value="false">删除不退积分</option><option value="true">删除退积分</option></select><button class="btn secondary" onclick="savePointsSetting()">保存</button></div></section>
    <section class="panel"><h3>TTL 设置</h3><div class="form-grid"><input id="defaultTtl" type="number" min="60" value="${esc(cache.settings?.defaultTtl)}" placeholder="默认 TTL"><button class="btn secondary" onclick="saveTtl()">保存</button></div></section>
  </div>`
  $('protection').value = String(Boolean(cache.settings?.protectionEnabled))
  $('refund').value = String(Boolean(cache.settings?.deleteRefundEnabled))
}
function renderRecords() {
  $('view').innerHTML = `<section class="panel"><h3>解析总览</h3>${table(cache.records||[], [['fullDomain','域名'],['type','类型'],['content','内容'],['uid','UID'],[r=>r.enabled?'<span class="badge green">启用</span>':'<span class="badge red">关闭</span>','状态'],['createIp','创建 IP'],['createdAt','创建时间']])}</section>`
}
function typeChip(t, reject=false){ return `<span class="chip ${reject?'reject':''}" draggable="true" ondragstart="draggedType='${t}'">${t}</span>` }
function accountLabel(id){ const a=(cache.accounts||[]).find(x=>x.id===id); return a ? (a.remark || a.name) : id }
function allowedTypes(){ return Array.from(document.querySelectorAll('.dropbox:not(.reject) .chip')).map(el=>el.textContent.trim()) }
function dropType(target){ if(!draggedType)return; const set=new Set(cache.settings?.allowedTypes||[]); target==='allow'?set.add(draggedType):set.delete(draggedType); cache.settings.allowedTypes=[...set]; draggedType=''; renderSettings() }
async function saveSettingsPatch(patch){ await api('/api/admin/settings',{method:'PATCH',body:JSON.stringify(patch)}); await loadAll() }
async function saveTypes(){ await saveSettingsPatch({allowedTypes: allowedTypes()}) }
async function saveProtection(){ await saveSettingsPatch({protectionEnabled:$('protection').value==='true'}) }
async function savePointsSetting(){ await saveSettingsPatch({initialPoints:Number($('initialPoints').value),deleteRefundEnabled:$('refund').value==='true'}) }
async function saveTtl(){ await saveSettingsPatch({defaultTtl:Number($('defaultTtl').value)}) }
async function addUser(){ await api('/api/admin/users',{method:'POST',body:JSON.stringify({email:$('uEmail').value,uid:$('uUid').value||undefined,name:$('uName').value,points:Number($('uPoints').value||0)})}); await loadAll() }
async function adjust(uid){ const delta=Number(prompt('积分增减数，例如 1 或 -1')); if(!delta)return; await api(`/api/admin/users/${encodeURIComponent(uid)}/points`,{method:'PATCH',body:JSON.stringify({delta,message:'后台手动调整'})}); await loadAll() }
async function banUser(uid,banned){ const reason=banned?prompt('封禁原因','后台封禁'):''; await api(`/api/admin/users/${encodeURIComponent(uid)}/ban`,{method:'PATCH',body:JSON.stringify({banned,reason})}); await loadAll() }
async function deleteUser(uid){ if(!confirm('确认删除该用户？仅允许删除没有解析记录的用户。'))return; await api(`/api/admin/users/${encodeURIComponent(uid)}`,{method:'DELETE'}); await loadAll() }
async function addAccount(){ const authType=$('accType').value; await api('/api/admin/cf-accounts',{method:'POST',body:JSON.stringify({remark:$('accRemark').value,authType,email:$('accEmail')?.value,apiKey:$('accKey')?.value,apiToken:$('accToken')?.value})}); await loadAll() }
async function deleteAccount(id){ if(!confirm('确认删除该 CF 账户？'))return; await api(`/api/admin/cf-accounts/${encodeURIComponent(id)}`,{method:'DELETE'}); await loadAll() }
async function addDomain(){ await api('/api/admin/domains',{method:'POST',body:JSON.stringify({root:$('root').value,cfAccountId:$('cfAccountId').value,pointCost:Number($('pointCost').value||1)})}); await loadAll() }
async function deleteDomain(root){ if(!confirm('确认删除/禁用该域名？有解析记录时会自动禁用。'))return; await api(`/api/admin/domains/${encodeURIComponent(root)}`,{method:'DELETE'}); await loadAll() }
async function addBlacklist(){ await api('/api/admin/blacklist',{method:'POST',body:JSON.stringify({pattern:$('pattern').value,target:$('target').value,type:$('type').value,reason:$('reason').value})}); await loadAll() }
async function deleteBlacklist(id){ await api(`/api/admin/blacklist/${encodeURIComponent(id)}`,{method:'DELETE'}); await loadAll() }
if (localStorage.getItem('mail_token')) enterAdmin()
</script>
